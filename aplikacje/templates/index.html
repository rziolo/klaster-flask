{% extends "shared/templates/base.html" %}

{% block title %}HUB - Moje Aplikacje{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-10 text-center">
        <h2 class="mb-4 text-white p-3 bg-dark rounded">Moje Aplikacje - HUB</h2>
        <div class="row g-4 mt-2">
            <div class="col-md-4">
                <a href="/finanse" class="card h-100 text-decoration-none shadow border-0 bg-primary text-white p-4">
                    <div class="card-body">
                        <i class="fas fa-wallet fa-3x mb-3"></i>
                        <h4 class="card-title">💰 Moje Finanse</h4>
                    </div>
                </a>
            </div>
            <div class="col-md-4">
                <a href="/inwestycje" class="card h-100 text-decoration-none shadow border-0 bg-info text-white p-4">
                    <div class="card-body">
                        <i class="fas fa-chart-line fa-3x mb-3"></i>
                        <h4 class="card-title">📈 Moje Inwestycje</h4>
                    </div>
                </a>
            </div>
            <div class="col-md-4">
                <a href="/zdrowie" class="card h-100 text-decoration-none shadow border-0 bg-success text-white p-4">
                    <div class="card-body">
                        <i class="fas fa-hand-holding-medical fa-3x mb-3"></i>
                        <h4 class="card-title">🏥 Moje Zdrowie</h4>
                    </div>
                </a>
            </div>
        </div>
        <div class="mt-5 p-3 rounded bg-white shadow-sm border d-inline-block px-5">
            <span class="text-success">●</span> ✅ Połączono z bazą danych (192.168.1.156)
        </div>
    </div>
</div>
{% endblock %}
