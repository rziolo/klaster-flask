{% extends "base.html" %}
{% block content %}
<div class="alert alert-danger shadow">
    <h4>Czy na pewno chcesz usunąć ten pomiar?</h4>
    <p>Data: {{ row.Date.strftime('%d.%m.%Y %H:%M') }} | Wynik: {{ row.P_skurczowe }}/{{ row.P_rozkurczowe }}</p>
    <form method="POST">
        <button type="submit" class="btn btn-danger">Tak, usuń</button>
        <a href="{{ url_for('pressure_list') }}" class="btn btn-secondary">Anuluj</a>
    </form>
</div>
{% endblock %}
