{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h3><i class="fas fa-info-circle"></i> Szczegóły pomiaru #{{ row.id_ha_fit }}</h3>
        </div>
        <div class="card-body">
            <p><strong>Data:</strong> {{ row.Date }}</p>
            <p><strong>Ciśnienie:</strong> {{ row.P_skurczowe }} / {{ row.P_rozkurczowe }} mmHg</p>
            <p><strong>Puls:</strong> {{ row.Puls }}</p>
            <p><strong>Waga:</strong> {{ row.waga }} kg</p>
            <p><strong>Uwagi:</strong> {{ row.uwagi }}</p>
        </div>
        <div class="card-footer">
            <a href="{{ url_for('pressure_list') }}" class="btn btn-secondary">Wróć do listy</a>
        </div>
    </div>
</div>
{% endblock %}
