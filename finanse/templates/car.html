{% extends "base.html" %}
{% block content %}
<div class="container-fluid mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2><i class="fas fa-car text-primary"></i> Koszty Samochodu</h2>
        <a href="{{ url_for('index') }}" class="btn btn-secondary btn-sm">Powrót</a>
    </div>
    
    <div class="table-responsive">
        <table class="table table-bordered table-hover text-center align-middle">
            <thead class="table-dark">
                <tr>
                    <th>Miesiąc</th>
                    <th>Koszt [zł]</th>
                    <th>Licznik</th>
                    <th>Poprzedni</th>
                    <th>Przebieg</th>
                    <th>Koszt/km</th>
                </tr>
            </thead>
            <tbody>
                {% for row in rows %}
                <tr>
                    <td>{{ row.miesiac }}</td>
                    <td class="fw-bold">{{ row.koszt_zl }}</td>
                    <td>{{ row.licznik }}</td>
                    <td class="text-muted">{{ row.poprzedni }}</td>
                    <td class="table-info fw-bold">{{ row.przebieg }}</td>
                    <td class="text-danger fw-bold">{{ row.koszt_na_km }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
