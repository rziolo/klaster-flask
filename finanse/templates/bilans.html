{% extends "base.html" %}
{% block content %}
<div class="container mt-3">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2><i class="fas fa-chart-line text-info"></i> Bilans Miesięczny</h2>
        <a href="{{ url_for('index') }}" class="btn btn-outline-secondary btn-sm"><i class="fas fa-arrow-left"></i> Powrót</a>
    </div>
    <div class="table-responsive">
        <table class="table table-sm table-hover table-bordered bg-white">
            <thead class="table-dark text-center">
                <tr>
                    <th>Rok-Miesiąc</th>
                    <th>Przychody</th>
                    <th>Wydatki</th>
                    <th>Bilans</th>
                    <th>Stan ROR/Lokaty</th>
                </tr>
            </thead>
            <tbody>
                {% for b in bilans_data %}
                <tr>
                    <td class="text-center">{{ b.ym }}</td>
                    <td class="text-end text-success">{{ b.przychody }}</td>
                    <td class="text-end text-danger">{{ b.wydatki }}</td>
                    <td class="text-end fw-bold {{ b.bilans_color }}">{{ b.bilans }}</td>
                    <td class="text-end text-primary">{{ b.ror }}</td>
                </tr>
                {% else %}
                <tr><td colspan="5" class="text-center">Brak danych</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
