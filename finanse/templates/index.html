{% extends "base.html" %}
{% block content %}
<div class="container mt-3">
    <div class="text-center mb-4">
        <h2 class="fw-bold"><i class="fas fa-wallet text-primary"></i> System Domowy</h2>
        <p class="text-muted mb-0">Zarządzanie budżetem i stanem kont</p>
    </div>

    <h6 class="text-muted border-bottom pb-1 mb-3">WPROWADZANIE DANYCH</h6>
    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card h-100 shadow-sm border-primary">
                <div class="card-body text-center py-3">
                    <i class="fas fa-university fa-2x mb-2 text-primary"></i>
                    <h6 class="card-title mb-1">Stan Kont (ROR)</h6>
                    <a href="{{ url_for('ror_list') }}" class="btn btn-sm btn-primary w-100">Otwórz</a>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card h-100 shadow-sm border-danger">
                <div class="card-body text-center py-3">
                    <i class="fas fa-shopping-cart fa-2x mb-2 text-danger"></i>
                    <h6 class="card-title mb-1">Wydatki</h6>
                    <a href="{{ url_for('wydatki_list') }}" class="btn btn-sm btn-danger w-100">Otwórz</a>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card h-100 shadow-sm border-success">
                <div class="card-body text-center py-3">
                    <i class="fas fa-hand-holding-usd fa-2x mb-2 text-success"></i>
                    <h6 class="card-title mb-1">Przychody</h6>
                    <a href="{{ url_for('przychody_list') }}" class="btn btn-sm btn-success w-100">Otwórz</a>
                </div>
            </div>
        </div>
    </div>

    <h6 class="text-muted border-bottom pb-1 mb-3">ANALIZA I RAPORTY</h6>
    <div class="row g-3">
        <div class="col-md-6">
            <div class="card shadow-sm border-info">
                <div class="card-body py-2 d-flex align-items-center justify-content-between">
                    <div class="d-flex align-items-center">
                        <i class="fas fa-chart-line fa-lg text-info me-3"></i>
                        <span class="fw-bold">Bilans Miesięczny</span>
                    </div>
                    <a href="{{ url_for('bilans_view') }}" class="btn btn-sm btn-outline-info">Zobacz</a>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card shadow-sm border-dark">
                <div class="card-body py-2 d-flex align-items-center justify-content-between">
                    <div class="d-flex align-items-center">
                        <i class="fas fa-car fa-lg text-dark me-3"></i>
                        <span class="fw-bold">Koszty Samochodu</span>
                    </div>
                    <a href="{{ url_for('car_view') }}" class="btn btn-sm btn-outline-dark">Zobacz</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
