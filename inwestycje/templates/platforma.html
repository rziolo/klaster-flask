{% extends "base.html" %}
{% block content %}
<div class="container mt-3">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2><i class="fas fa-desktop text-primary"></i> Platformy Inwestycyjne</h2>
        <div class="btn-group">
            <a href="/inwestycje" class="btn btn-outline-secondary btn-sm"><i class="fas fa-arrow-left"></i> Powrót</a>
            <a href="/inwestycje/platforma/create" class="btn btn-success btn-sm"><i class="fas fa-plus"></i> Dodaj platformę</a>
        </div>
    </div>
    <div class="table-responsive">
        <table class="table table-sm table-hover table-bordered bg-white">
            <thead class="table-dark text-center">
                <tr>
                    <th>ID</th>
                    <th>Nazwa Platformy</th>
                    <th>URL / Adres</th>
                    <th>Opcje</th>
                </tr>
            </thead>
            <tbody>
                {% for row in rows %}
                <tr class="text-center">
                    <td>{{ row.id_platforma }}</td>
                    <td class="fw-bold">{{ row.platforma_name }}</td>
                    <td><a href="{{ row.url }}" target="_blank" class="text-decoration-none">{{ row.url }}</a></td>
                    <td>
                        <div class="btn-group btn-group-sm">
                            <a href="/inwestycje/platforma/view/{{ row.id_platforma }}" class="btn btn-outline-info"><i class="fas fa-eye"></i></a>
                            <a href="/inwestycje/platforma/edit/{{ row.id_platforma }}" class="btn btn-outline-primary"><i class="fas fa-edit"></i></a>
                            <a href="/inwestycje/platforma/delete/{{ row.id_platforma }}" class="btn btn-outline-danger" onclick="return confirm('Usunąć platformę {{ row.platforma_name }}?')"><i class="fas fa-trash"></i></a>
                        </div>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
