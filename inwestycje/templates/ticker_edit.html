{% extends "base.html" %}
{% block content %}
<div class="container mt-3" style="max-width: 600px;">
    <div class="card shadow-sm border-primary">
        <div class="card-header bg-primary text-white py-2"><strong>Edytuj Ticker: {{ row.ticker_name }}</strong></div>
        <div class="card-body">
            <form method="POST">
                <div class="mb-3">
                    <label class="small fw-bold">Nazwa spółki / Ticker</label>
                    <input type="text" name="ticker_name" class="form-control form-control-sm" value="{{ row.ticker_name }}" required>
                </div>
                <div class="mb-3">
                    <label class="small fw-bold">Rynek / Platforma</label>
                    <select name="market" class="form-select form-select-sm">
                        {% for p in platforms %}
                        <option value="{{ p.platforma_name }}" {{ 'selected' if p.platforma_name == row.market }}>
                            {{ p.platforma_name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="row">
                    <div class="col-6 mb-3">
                        <label class="small fw-bold">Rating</label>
                        <input type="text" name="rating" class="form-control form-control-sm" value="{{ row.rating }}">
                    </div>
                    <div class="col-6 mb-3">
                        <label class="small fw-bold">Altman (Z-Score)</label>
                        <input type="text" name="altman" class="form-control form-control-sm" value="{{ row.altman }}">
                    </div>
                </div>
                <div class="text-end">
                    <a href="/inwestycje/ticker" class="btn btn-secondary btn-sm">Anuluj</a>
                    <button type="submit" class="btn btn-primary btn-sm">Zapisz zmiany</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
